version: '3.8'
services:
  arangodb:
    image: arangodb:latest
    environment:
      - ARANGO_ROOT_PASSWORD=NT208@
    ports:
      - "8529:8529"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ArangoDB__Uri=http://arangodb:8529
      - ArangoDB__Database=ThreatGraphDB
      - ArangoDB__Username=root
      - ArangoDB__Password=NT208@
    depends_on:
      - arangodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api 
    ports:
      - "3000:80"
    depends_on:
      - backend